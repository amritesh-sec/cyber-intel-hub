# ============================================================
# CYBER INTEL HUB — General Cybersecurity Research Repo
# Part of amritesh-sec research hub
# ============================================================

title: "Cyber Intel Hub | Amritesh"
tagline: "Threat Intelligence · Attack Analysis · Breach Breakdowns · Defence Strategy"
description: "General cybersecurity intelligence — threat analysis, data breach breakdowns, attack chain documentation, and defence strategy by Amritesh. US, UK, EU & Nordic focus."
author: "Amritesh"
baseurl: "/cyber-intel-hub"
url: "https://amritesh-sec.github.io"

parent_site:
  name: "Amritesh.sec"
  url: "https://amritesh-sec.github.io"

nordvault_url: "https://nordvaultsec.github.io"

lang: "en"
timezone: "Europe/London"
permalink: /:year/:month/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  sass_dir: _sass
  style: compressed

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Amritesh"
      category: "cybersecurity"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby
  - TEMPLATE*.md
